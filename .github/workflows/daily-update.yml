name: Daily Satellite Report Update

on:
  schedule:
    # 每天早上8点运行 (UTC 00:00 = 北京时间 08:00)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  update-report:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4
        
    - name: Update news data
      run: |
        python scripts/news_fetcher.py || echo "News update skipped"
        
    - name: Generate report
      run: |
        python scripts/generate_report.py generate || echo "Using existing index.html"
        
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -A
        git commit -m "📊 Update report: $(date +'%Y-%m-%d')" || exit 0
        git push
