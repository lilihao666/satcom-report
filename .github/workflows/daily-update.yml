name: Daily Auto Update

on:
  schedule:
    # 每天早上 8:00 UTC+8 运行 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Jinja2

      - name: Fetch latest news
        run: python scripts/news_fetcher.py
        env:
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}

      - name: Generate free report
        run: python scripts/generate_report_v4.py generate

      - name: Generate premium report
        run: python scripts/generate_premium.py generate

      - name: Update last_updated timestamp
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          # 更新 data/satcom_data.json 中的 last_updated
          python3 -c "
import json
with open('data/satcom_data.json', 'r', encoding='utf-8') as f:
    data = json.load(f)
data['last_updated'] = '$DATE'
with open('data/satcom_data.json', 'w', encoding='utf-8') as f:
    json.dump(data, f, ensure_ascii=False, indent=2)
"

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      - name: Commit and push changes
        run: |
          git add -A
          git diff --cached --quiet || (git commit -m "Auto update: $DATE - refresh news and reports" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
