name: Daily Update

on:
  schedule:
    - cron: '0 8 * * *'  # 每天北京时间8:00运行 (UTC 00:00)
  workflow_dispatch:     # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        pip install requests feedparser jinja2
        
    - name: Update data timestamp
      run: |
        python3 -c "
        import json
        from datetime import datetime
        with open('data/satcom_data.json', 'r', encoding='utf-8') as f:
            data = json.load(f)
        data['last_updated'] = datetime.now().strftime('%Y-%m-%d')
        with open('data/satcom_data.json', 'w', encoding='utf-8') as f:
            json.dump(data, f, ensure_ascii=False, indent=2)
        print(f'Updated timestamp: {data[\"last_updated\"]}')
        "
        
    - name: Fetch news
      run: |
        python3 scripts/news_fetcher.py --force-simulated
      continue-on-error: true
      
    - name: Generate free report
      run: |
        python3 scripts/generate_report_v4.py generate
        
    - name: Generate premium report
      run: |
        python3 scripts/generate_premium.py generate
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        exclude_assets: 'scripts,docker-compose.yml,Dockerfile,.github,.gitignore,requirements.txt,README.md'
